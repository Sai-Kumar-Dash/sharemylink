<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receive Link</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen text-white px-4">
<div class="bg-gray-800 p-6 sm:p-10 rounded-xl w-full max-w-md text-center">
    <h2 class="text-2xl sm:text-3xl font-bold mb-6">Receive Link</h2>
    <input id="code" placeholder="Enter 6 digit code"
           class="w-full p-3 rounded text-black mb-4 text-sm sm:text-base"
           maxlength="6" inputmode="numeric"/>
    <button onclick="getLink()"
            class="bg-green-500 hover:bg-green-600 w-full p-3 rounded-lg text-sm sm:text-base">
        Get Link
    </button>
    <p id="result" class="mt-6 text-blue-400 break-all text-sm"></p>
    <a href="dashboard.html"
       class="inline-block mt-6 text-gray-400 hover:text-white text-sm">
        ← Back to Dashboard
    </a>
</div>
    <footer class="mt-8 text-gray-500 text-sm text-center">
    Made by <span class="text-yellow-400 font-semibold">Sai Kumar Dash</span>
    </footer>
<script src="js/share.js"></script>
</body>
</html>
