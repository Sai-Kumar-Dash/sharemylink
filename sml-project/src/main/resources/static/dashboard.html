<!DOCTYPE html>
<html>
<head>
    <title>SML Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/auth.js"></script>
    <script>checkLogin();</script>
</head>
<body class="bg-gray-900 text-white">

<!-- Navbar -->
<div class="bg-gray-800 p-4 flex justify-between items-center flex-wrap gap-3">
    <h1 class="text-xl sm:text-2xl font-bold">SML Dashboard</h1>
    <div class="flex items-center flex-wrap gap-2">
        <span id="userDisplay" class="text-yellow-400 text-sm sm:text-base"></span>
        <a href="send.html"
           class="bg-blue-500 hover:bg-blue-600 px-3 py-2 rounded text-sm">
            Send
        </a>
        <a href="receive.html"
           class="bg-green-500 hover:bg-green-600 px-3 py-2 rounded text-sm">
            Receive
        </a>
        <button onclick="logout()"
                class="bg-red-500 hover:bg-red-600 px-3 py-2 rounded text-sm">
            Logout
        </button>
    </div>
</div>

<!-- Main -->
<div class="p-4 sm:p-10">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-lg sm:text-xl font-semibold">Your Links</h2>
        <button onclick="addLink()"
                class="bg-blue-500 hover:bg-blue-600 px-3 py-2 rounded text-sm">
            + Add Link
        </button>
    </div>
    <div id="links" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
</div>
    
<footer class="mt-8 text-gray-500 text-sm text-center">
    Made by <span class="text-yellow-400 font-semibold">Sai Kumar Dash</span>
</footer>
    
<script>
    showUser();

    function formatUrl(url){
        if(!url.startsWith("http://") && !url.startsWith("https://")){
            return "https://" + url;
        }
        return url;
    }

    async function loadLinks(){
        let userId = localStorage.getItem("userId");
        let res = await fetch("/api/links/" + userId);
        let links = await res.json();
        let container = document.getElementById("links");
        container.innerHTML = "";

        if(links.length === 0){
            container.innerHTML = `
                <p class="text-gray-400 col-span-3">
                    No links yet. Click "+ Add Link" to add one.
                </p>`;
            return;
        }

        links.forEach(link => {
            container.innerHTML += `
                <div class="bg-gray-800 p-4 rounded-lg flex flex-col gap-2">
                    <p class="text-sm text-gray-300 break-all">${link.url}</p>
                    <div class="flex justify-between items-center mt-2">
                        <a href="${formatUrl(link.url)}" target="_blank"
                           class="text-blue-400 hover:underline text-sm">
                            Open ↗
                        </a>
                        <button onclick="deleteLink(${link.id})"
                                class="text-red-400 hover:text-red-600 text-sm">
                            Delete
                        </button>
                    </div>
                </div>`;
        });
    }

    async function addLink(){
        let url = prompt("Paste your link here:");
        let userId = localStorage.getItem("userId");
        if(!url || url.trim() === "") return;

        let res = await fetch("/api/links", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ url: url.trim(), userId: userId })
        });

        if(res.ok){ loadLinks(); }
        else { alert("Failed to add link. Please try again."); }
    }

    async function deleteLink(id){
        if(!window.confirm("Delete this link?")) return;
        let res = await fetch("/api/links/" + id, { method: "DELETE" });
        if(res.ok){ loadLinks(); }
        else { alert("Failed to delete link."); }
    }

    loadLinks();
</script>
</body>
</html>
