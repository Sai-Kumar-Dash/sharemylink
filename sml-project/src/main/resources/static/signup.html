<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SML Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen text-white px-4">
<div class="bg-gray-800 p-6 sm:p-10 rounded-xl w-full max-w-md">
    <h2 class="text-2xl sm:text-3xl font-bold mb-6 text-center">Sign Up</h2>
    <input id="name" placeholder="Full Name"
           class="w-full p-3 rounded text-black mb-4 text-sm sm:text-base"/>
    <input id="email" placeholder="Email" type="email"
           class="w-full p-3 rounded text-black mb-4 text-sm sm:text-base"/>
    <input id="password" type="password" placeholder="Password"
           class="w-full p-3 rounded text-black mb-4 text-sm sm:text-base"/>
    <button onclick="signup()"
            class="bg-blue-500 hover:bg-blue-600 w-full p-3 rounded text-sm sm:text-base">
        Create Account
    </button>
    <p class="text-center mt-4 text-sm sm:text-base">
        Already have an account?
        <a href="signin.html" class="text-blue-400">Sign In</a>
    </p>
</div>
    <footer class="mt-8 text-gray-500 text-sm text-center">
    Made by <span class="text-yellow-400 font-semibold">Sai Kumar Dash</span>
</footer>
<script src="js/auth.js"></script>
</body>
</html>
